name: Build APK

on:
  workflow_dispatch:
    inputs:
      site_url:
        description: 'رابط الموقع'
        required: true
      app_name:
        description: 'اسم التطبيق'
        required: true
      app_id:
        description: 'معرف التطبيق (مثل: com.example.app)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install bubblewrap
        run: npm install -g @bubblewrap/cli
      
      - name: Create APK
        run: |
          mkdir -p build && cd build
          bubblewrap init --manifest https://raw.githubusercontent.com/${{ github.repository }}/main/manifest.json
          bubblewrap build
      
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: apk-build
          path: build/app-release.apk
