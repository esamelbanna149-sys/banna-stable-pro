name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Init Bubblewrap project
        run: |
          bubblewrap init --manifest https://esamelbanna149-sys.github.io/elbanna-store/manifest.json --directory ./bubblewrap-project -y

      - name: Build APK
        working-directory: ./bubblewrap-project
        run: bubblewrap build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: elbanna-store-apk
          path: ./bubblewrap-project/app-release-signed.apk
